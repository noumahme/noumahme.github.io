<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="shortcut icon" type="image/png" href="{{ '/assets/logo/favicon.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/responsive.css' | relative_url }}">
</head>
<body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>
    <div class="page-noise"></div>
    <div class="page-glow page-glow-a"></div>
    <div class="page-glow page-glow-b"></div>
    <div class="scroll-progress" aria-hidden="true"><span></span></div>

    <header class="site-header" id="top">
        <div class="container header-inner">
            <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
                <span class="brand-mark">NA</span>
                <span class="brand-text">{{ site.title }}</span>
            </a>

            <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
                <a href="{{ '/' | relative_url }}#about">About</a>
                <a href="{{ '/' | relative_url }}#work"{% if page.nav_section == 'projects' %} class="is-active"{% endif %}>Projects</a>
                <a href="{{ '/' | relative_url }}#experience">Experience</a>
                <a href="{{ '/' | relative_url }}#skills">Skills</a>
                <a href="{{ '/' | relative_url }}#contact">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>{{ site.title }}</p>
            <p>PhD researcher and software developer focused on machine learning systems, scalable applications, and practical AI features.</p>
        </div>
    </footer>

    <script src="{{ '/assets/js/custom.js' | relative_url }}"></script>
</body>
</html>
